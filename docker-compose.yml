version: '3.8'

services:
  # Primary Operational DB
  mongodb:
    image: mongo:6.0.5
    container_name: medsphere_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - medsphere_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Temporal Knowledge Graph
  neo4j:
    image: neo4j:5.9.0-community
    container_name: medsphere_neo4j
    ports:
      - "7474:7474"  # HTTP Web Console
      - "7687:7687"  # Bolt API protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - medsphere_network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Vector Database
  qdrant:
    image: qdrant/qdrant:v1.3.0
    container_name: medsphere_qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - medsphere_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend Web Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medsphere_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/medsphere
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - OPENAI_MODEL=gpt-4o-mini
      - ALLOW_MOCK_FALLBACK=true
    volumes:
      - ./backend:/app
      - ./patients_mock_dataset_1000.csv:/app/patients_mock_dataset_1000.csv
      - ./diagnoses_mock_dataset_3000.csv:/app/diagnoses_mock_dataset_3000.csv
      - ./medications_mock_dataset_5000.csv:/app/medications_mock_dataset_5000.csv
      - ./visits_mock_dataset_5000.csv:/app/visits_mock_dataset_5000.csv
      - ./lab_results_mock_dataset_32000.csv:/app/lab_results_mock_dataset_32000.csv
      - ./clinical_notes_mock_dataset_10000.csv:/app/clinical_notes_mock_dataset_10000.csv
      - ./timeline_events_mock_dataset_25000.csv:/app/timeline_events_mock_dataset_25000.csv
      - ./doctor_notes_mock_dataset.json:/app/doctor_notes_mock_dataset.json
      - ./guideline_documents:/app/guideline_documents
      - ./uploaded_documents_discharge_summaries_500:/app/uploaded_documents_discharge_summaries_500
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - medsphere_network

  # Next.js 15 Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medsphere_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - medsphere_network

networks:
  medsphere_network:
    driver: bridge

volumes:
  mongo_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
